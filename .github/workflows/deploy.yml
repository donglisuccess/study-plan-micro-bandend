name: Deploy backend

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: study-plan-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.21"

      - name: Check lockfile
        run: uv lock --check

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.SERVER_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$SSH_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Upload application
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PORT: ${{ vars.SERVER_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude "data/" \
            -e "ssh -p ${PORT:-22}" \
            ./ "$USER@$HOST:${DEPLOY_PATH:-/opt/study-plan-api}/"

      - name: Sync, restart and verify
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          PORT: ${{ vars.SERVER_PORT }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        run: |
          ssh -p "${PORT:-22}" "$USER@$HOST" "
            set -e
            cd '${DEPLOY_PATH:-/opt/study-plan-api}'
            /home/deploy/.local/bin/uv sync --locked
            sudo systemctl restart study-plan-api
            sleep 2
            curl --fail --silent --show-error http://127.0.0.1:5000/health
          "
